<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Förderverein Ev. Kindergarten Senfkorn e.V.</title>
    
    <!-- Konfiguration -->
    <script src="config.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#F3E9E2', 
                            DEFAULT: '#D97706', 
                            dark: '#B45309', 
                            green: '#65A30D' 
                        },
                        soft: {
                            amber: '#FFFBF0', 
                            green: '#F7FBF2', 
                            stone: '#FAFAF9'  
                        }
                    },
                    fontFamily: {
                        sans: ['"Open Sans"', 'sans-serif'],
                        display: ['"Nunito"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .blob-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
        }
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Spielerische Animationen */
        .floating { animation: float 6s ease-in-out infinite; }
        .floating-delayed { animation: float 8s ease-in-out infinite; animation-delay: 2s; }
        .floating-slow { animation: float 12s ease-in-out infinite; animation-delay: 1s; }
        
        @keyframes float {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            33% { transform: translate(10px, -25px) rotate(3deg); }
            66% { transform: translate(-10px, -15px) rotate(-3deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
    </style>
</head>
<body class="font-sans text-gray-700 bg-soft-amber flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center gap-2">
                        <div class="w-10 h-10 bg-brand-green rounded-full flex items-center justify-center text-white relative overflow-hidden">
                            <i data-lucide="sprout" class="w-6 h-6 relative z-10"></i>
                            <div class="absolute bottom-0 w-full h-1/3 bg-brand-dark opacity-20"></div>
                        </div>
                        <span class="font-display font-bold text-lg sm:text-xl text-gray-800 tracking-tight leading-tight">
                            <span id="nav-title"></span> 
                            <span class="block text-xs font-normal text-gray-500" id="nav-subtitle"></span>
                        </span>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-8" id="desktop-menu"></div>
                <div class="flex items-center md:hidden">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-brand focus:outline-none p-2">
                        <i data-lucide="menu" class="w-8 h-8"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 shadow-lg" id="mobile-menu-items"></div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="relative pt-28 pb-16 lg:pt-40 lg:pb-32 overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="lg:grid lg:grid-cols-12 lg:gap-12 items-center">
                <div class="sm:text-center md:max-w-2xl md:mx-auto lg:col-span-6 lg:text-left">
                    <div class="inline-flex items-center px-3 py-1 rounded-full border border-brand/20 bg-orange-50/50 text-brand-dark text-sm font-semibold mb-6">
                        <i data-lucide="heart" class="w-4 h-4 mr-2 text-brand"></i> <span id="hero-badge"></span>
                    </div>
                    <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl font-display mb-6">
                        <span id="hero-title-1"></span><br>
                        <span class="text-brand" id="hero-title-2"></span>
                    </h1>
                    <p class="mt-4 text-base text-gray-600 sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0" id="hero-text"></p>
                    <div class="mt-8 sm:max-w-lg sm:mx-auto sm:text-center lg:text-left lg:mx-0 flex flex-col sm:flex-row gap-4">
                        <a href="#mitgliedschaft" class="flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-full text-white bg-brand hover:bg-brand-dark md:py-4 md:text-lg transition shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                            Mitglied werden
                        </a>
                        <a href="#projekte" class="flex items-center justify-center px-8 py-3 border border-gray-200 text-base font-medium rounded-full text-gray-700 bg-white hover:bg-gray-50 md:py-4 md:text-lg transition">
                            Unsere Projekte
                        </a>
                    </div>
                </div>
                <div class="mt-12 relative sm:max-w-lg sm:mx-auto lg:mt-0 lg:max-w-none lg:mx-0 lg:col-span-6">
                    <div class="relative mx-auto w-full aspect-square max-w-md blob-shape bg-white shadow-xl overflow-hidden border-4 border-white">
                        <img id="hero-image" class="w-full h-full object-cover" src="" alt="Kita Atmosphäre">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Über Uns Section -->
    <section id="ueber-uns" class="py-20 bg-white relative overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center mb-16">
                <h2 class="text-brand font-semibold tracking-wide uppercase" id="about-badge"></h2>
                <p class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-gray-900 font-display sm:text-4xl" id="about-title"></p>
                <p class="mt-4 max-w-3xl text-xl text-gray-500 mx-auto" id="about-text"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="features-container"></div>
        </div>
    </section>

    <!-- Projekte Section -->
    <section id="projekte" class="py-20 bg-soft-stone relative overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-3xl font-extrabold text-gray-900 font-display border-l-4 border-brand pl-4" id="projects-title"></h2>
            </div>
            <div class="flex flex-col gap-10" id="projects-container"></div>
            <div id="projects-more-container" class="mt-12 text-center hidden">
                <button id="projects-more-btn" class="inline-flex items-center px-6 py-3 border border-gray-300 shadow-sm text-base font-medium rounded-full text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition">
                    <span id="projects-more-text"></span>
                    <i data-lucide="chevron-down" class="ml-2 -mr-1 h-5 w-5"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Aktionen Section -->
    <section id="aktionen" class="py-20 bg-white relative overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-extrabold text-gray-900 font-display mb-4" id="actions-title"></h2>
                <p class="text-xl text-gray-500 max-w-2xl mx-auto" id="actions-subtitle"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="actions-container"></div>
            <div id="actions-more-container" class="mt-12 text-center hidden">
                <button id="actions-more-btn" class="inline-flex items-center px-6 py-3 border border-gray-300 shadow-sm text-base font-medium rounded-full text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition">
                    <span id="actions-more-text"></span>
                    <i data-lucide="chevron-down" class="ml-2 -mr-1 h-5 w-5"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Testimonials -->
    <section id="testimonials" class="py-20 bg-soft-green relative overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center mb-16">
                <h2 class="text-3xl font-extrabold text-gray-900 font-display mb-4" id="testimonials-title"></h2>
                <p class="text-xl text-gray-500" id="testimonials-subtitle"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="testimonials-container"></div>
        </div>
    </section>

    <!-- Mitgliedschaft CTA -->
    <section id="mitgliedschaft" class="py-20 bg-brand-green text-white relative overflow-hidden">
        <div class="absolute inset-0 opacity-10" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
        <div class="max-w-4xl mx-auto px-4 relative z-10 text-center">
            <h2 class="text-3xl sm:text-4xl font-extrabold font-display mb-6" id="cta-title"></h2>
            <p class="text-lg sm:text-xl mb-10 text-green-50" id="cta-text"></p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button onclick="openModal()" class="bg-white text-brand-green font-bold py-4 px-8 rounded-full shadow-lg hover:bg-gray-100 transition transform hover:scale-105 flex items-center justify-center gap-2">
                    <i data-lucide="file-down" class="w-5 h-5"></i> <span id="btn-antrag"></span>
                </button>
                <a href="#spenden" class="bg-brand hover:bg-brand-dark text-white font-bold py-4 px-8 rounded-full shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                    <i data-lucide="heart-handshake" class="w-5 h-5"></i> Spendeninfos
                </a>
            </div>
        </div>
    </section>

    <!-- Spenden Details -->
    <section id="spenden" class="py-20 bg-white relative overflow-hidden">
        <div class="section-decorations"></div>
        <div class="max-w-3xl mx-auto px-4 relative z-10">
            <div class="bg-orange-50/40 border border-orange-100/50 rounded-3xl p-8 sm:p-12 text-center">
                <h3 class="text-2xl font-bold text-gray-800 mb-6" id="bank-title"></h3>
                <p class="text-gray-600 mb-8" id="donate-text"></p>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 inline-block w-full max-w-md mx-auto text-left relative">
                    <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-32 h-4 bg-gray-200/50 rounded-full"></div>
                    <div class="space-y-4">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-gray-100 pb-3 gap-1">
                            <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">Empfänger</span>
                            <span class="font-bold text-gray-800 break-words text-right" id="bank-recipient"></span>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-gray-100 pb-3 gap-1">
                            <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">Bank</span>
                            <span class="font-medium text-gray-800 text-right" id="bank-name"></span>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-gray-100 pb-3 gap-1">
                            <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">IBAN</span>
                            <div class="flex items-center justify-end gap-3 w-full sm:w-auto">
                                <span class="font-mono font-bold text-brand-dark text-lg break-all" id="iban-display"></span>
                                <button onclick="copyToClipboard()" class="bg-gray-100 hover:bg-brand hover:text-white p-2 rounded-lg transition shrink-0" title="IBAN Kopieren">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center pt-1 gap-1">
                            <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">BIC</span>
                            <span class="font-mono text-gray-800 text-right" id="bic-display"></span>
                        </div>
                    </div>
                </div>
                <div id="copy-feedback" class="h-6 text-sm text-brand font-bold mt-4 opacity-0 transition transform translate-y-2"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="kontakt" class="bg-gray-900 text-gray-300 py-12 border-t-4 border-brand">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div>
                    <h4 class="text-white text-lg font-bold mb-6 font-display flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-5 h-5 text-brand"></i> Kontakt
                    </h4>
                    <div id="footer-address" class="space-y-1"></div>
                    <a id="footer-email" href="" class="mt-4 inline-flex items-center gap-2 text-brand hover:text-white transition"></a>
                </div>
                <div>
                    <h4 class="text-white text-lg font-bold mb-6 font-display flex items-center gap-2">
                        <i data-lucide="scale" class="w-5 h-5 text-brand"></i> Rechtliches
                    </h4>
                    <ul class="space-y-3" id="footer-links"></ul>
                </div>
                <div>
                    <h4 class="text-white text-lg font-bold mb-6 font-display flex items-center gap-2">
                        <i data-lucide="sprout" class="w-5 h-5 text-brand"></i> Kita Senfkorn
                    </h4>
                    <p class="text-sm text-gray-400 leading-relaxed" id="footer-about"></p>
                </div>
            </div>
            <div class="border-t border-gray-800 mt-12 pt-8 text-center text-xs text-gray-500">
                &copy; <span id="current-year"></span> <span id="footer-copyright"></span>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="membership-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 relative shadow-2xl transform scale-100 transition-transform duration-300">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-brand bg-gray-50 hover:bg-orange-50 rounded-full p-2 transition">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                    <i data-lucide="download" class="h-8 w-8 text-green-600"></i>
                </div>
                <h3 class="text-xl leading-6 font-bold text-gray-900 font-display mb-2" id="modal-title"></h3>
                <p class="text-gray-500 mb-6" id="modal-text"></p>
                <a id="modal-download-btn" href="#" target="_blank" class="block w-full rounded-xl bg-brand text-white font-bold px-4 py-4 hover:bg-brand-dark transition shadow-md flex items-center justify-center gap-2 mb-3">
                    <i data-lucide="file-text" class="w-5 h-5"></i> <span id="modal-btn-text"></span>
                </a>
                <button onclick="closeModal()" class="text-sm text-gray-400 hover:text-gray-600 underline" id="modal-close-btn"></button>
            </div>
        </div>
    </div>

    <script>
        const ITEMS_PER_PAGE = 3;

        document.addEventListener('DOMContentLoaded', () => {
            renderContent();
            renderDecorations();
            lucide.createIcons();
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });

        function renderContent() {
            const c = webseitenInhalt;

            // Nav
            document.getElementById('nav-title').textContent = c.vereinNameKurz;
            document.getElementById('nav-subtitle').textContent = c.stadt;
            renderMenu(c.menu);

            // Hero
            document.getElementById('hero-badge').textContent = c.hero.badge;
            document.getElementById('hero-title-1').textContent = c.hero.titelZeile1;
            document.getElementById('hero-title-2').textContent = c.hero.titelZeile2;
            document.getElementById('hero-text').textContent = c.hero.text;
            document.getElementById('hero-image').src = c.hero.bildUrl;

            // Über Uns
            document.getElementById('about-badge').textContent = c.ueberUns.badge;
            document.getElementById('about-title').textContent = c.ueberUns.titel;
            document.getElementById('about-text').textContent = c.ueberUns.text;
            renderFeatures(c.ueberUns.karten);

            // Projekte
            document.getElementById('projects-title').textContent = c.projekteSettings.titel;
            document.getElementById('projects-more-text').textContent = c.projekteSettings.buttonAlle;
            renderProjects(c.projekte);

            // Aktionen
            document.getElementById('actions-title').textContent = c.aktionenSettings.titel;
            document.getElementById('actions-subtitle').textContent = c.aktionenSettings.untertitel;
            document.getElementById('actions-more-text').textContent = c.aktionenSettings.buttonAlle;
            renderActions(c.aktionen);

            // Testimonials
            document.getElementById('testimonials-title').textContent = c.testimonialsSettings.titel;
            document.getElementById('testimonials-subtitle').textContent = c.testimonialsSettings.untertitel;
            renderTestimonials(c.testimonials);

            // CTA
            document.getElementById('cta-title').textContent = c.cta.titel;
            document.getElementById('cta-text').textContent = c.cta.text;
            document.getElementById('btn-antrag').textContent = c.cta.buttonAntrag;
            document.getElementById('modal-download-btn').href = c.cta.dateiNameAntrag;

            // Bank
            document.getElementById('bank-title').textContent = c.bank.titel;
            document.getElementById('donate-text').textContent = c.bank.infoText;
            document.getElementById('bank-recipient').textContent = c.bank.empfaenger;
            document.getElementById('bank-name').textContent = c.bank.bankName;
            document.getElementById('iban-display').textContent = c.bank.iban;
            document.getElementById('bic-display').textContent = c.bank.bic;
            document.getElementById('copy-feedback').textContent = c.bank.copyFeedback;

            // Footer
            const addressContainer = document.getElementById('footer-address');
            addressContainer.innerHTML = c.footer.adresse.map(line => `<p>${line}</p>`).join('');
            
            const emailEl = document.getElementById('footer-email');
            emailEl.href = `mailto:${c.footer.email}`;
            emailEl.innerHTML = `<i data-lucide="mail" class="w-4 h-4"></i> ${c.footer.email}`;

            const linksContainer = document.getElementById('footer-links');
            linksContainer.innerHTML = c.footer.links.map(l => `<li><a href="${l.url}" class="hover:text-white transition">${l.text}</a></li>`).join('');

            document.getElementById('footer-about').textContent = c.footer.ueberText;
            document.getElementById('footer-copyright').textContent = c.vereinName;

            // Modal
            document.getElementById('modal-title').textContent = c.modal.titel;
            document.getElementById('modal-text').textContent = c.modal.text;
            document.getElementById('modal-btn-text').textContent = c.modal.buttonDownload;
            document.getElementById('modal-close-btn').textContent = c.modal.buttonSchliessen;
        }

        function renderDecorations() {
            const deko = webseitenInhalt.dekoElemente;
            
            Object.keys(deko).forEach(sectionId => {
                const section = document.getElementById(sectionId);
                if (!section) return;
                
                const container = section.querySelector('.section-decorations');
                if (!container) return;
                
                container.innerHTML = deko[sectionId].map(item => `
                    <div class="absolute ${item.pos} ${item.color} ${item.anim} z-0 pointer-events-none">
                        <i data-lucide="${item.icon}" class="${item.size}"></i>
                    </div>
                `).join('');
            });
        }

        function renderMenu(items) {
            const desktop = document.getElementById('desktop-menu');
            const mobile = document.getElementById('mobile-menu-items');
            desktop.innerHTML = ''; mobile.innerHTML = '';
            items.forEach(item => {
                if(item.highlight) {
                    desktop.innerHTML += `<a href="${item.link}" class="px-5 py-2.5 bg-brand text-white rounded-full font-bold hover:bg-brand-dark transition shadow-md transform hover:-translate-y-0.5">${item.label}</a>`;
                } else {
                    desktop.innerHTML += `<a href="${item.link}" class="text-gray-600 hover:text-brand font-medium transition">${item.label}</a>`;
                }
                mobile.innerHTML += `<a href="${item.link}" class="block px-3 py-2 rounded-md text-base font-medium ${item.highlight ? 'text-brand font-bold bg-orange-50' : 'text-gray-700 hover:text-brand hover:bg-gray-50'}">${item.label}</a>`;
            });
        }

        function renderFeatures(cards) {
            const container = document.getElementById('features-container');
            container.innerHTML = cards.map(card => {
                let colorClass = "bg-green-50 text-brand-green border-green-100";
                if(card.farbe === "yellow") colorClass = "bg-yellow-50 text-yellow-600 border-yellow-100";
                if(card.farbe === "orange") colorClass = "bg-orange-50 text-orange-600 border-orange-100";
                return `
                <div class="text-center p-6 ${colorClass} bg-opacity-50 rounded-2xl border transition hover:shadow-lg">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-current">
                        <i data-lucide="${card.icon}" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2 font-display">${card.titel}</h3>
                    <p class="text-gray-600 leading-relaxed">${card.text}</p>
                </div>`;
            }).join('');
        }

        function renderProjects(projects, showAll = false) {
            const container = document.getElementById('projects-container');
            const moreContainer = document.getElementById('projects-more-container');
            const itemsToShow = showAll ? projects : projects.slice(0, ITEMS_PER_PAGE);
            container.innerHTML = itemsToShow.map(p => {
                let statusColors = p.status === "aktiv" ? "text-brand-green bg-green-100" : (p.status === "geplant" ? "text-brand bg-orange-100" : "text-blue-600 bg-blue-100");
                return `
                <div class="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden md:flex transition hover:shadow-md animate-fade-in relative z-10">
                    <div class="md:w-1/3 relative">
                        <img class="h-64 w-full object-cover md:h-full" src="${p.bildUrl}" alt="${p.titel}">
                        <div class="absolute top-4 left-4 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide ${statusColors}">
                            ${p.statusText}
                        </div>
                    </div>
                    <div class="p-8 md:w-2/3 flex flex-col justify-center">
                        <h3 class="block mt-1 text-2xl leading-tight font-bold text-gray-900 font-display">${p.titel}</h3>
                        <p class="mt-3 text-gray-600 leading-relaxed">${p.beschreibung}</p>
                    </div>
                </div>`;
            }).join('');
            if (projects.length > ITEMS_PER_PAGE && !showAll) moreContainer.classList.remove('hidden');
            else moreContainer.classList.add('hidden');
            document.getElementById('projects-more-btn').onclick = () => renderProjects(projects, true);
            lucide.createIcons();
        }

        function renderActions(actions, showAll = false) {
            const container = document.getElementById('actions-container');
            const moreContainer = document.getElementById('actions-more-container');
            const itemsToShow = showAll ? actions : actions.slice(0, ITEMS_PER_PAGE);
            container.innerHTML = itemsToShow.map(a => {
                let style = a.bildUrl ? `background-image: url('${a.bildUrl}'); background-size: cover; background-position: center;` : "";
                let textColor = a.textFarbe === 'white' ? "text-white text-shadow" : "text-gray-900";
                let descColor = a.textFarbe === 'white' ? "text-gray-100 text-shadow" : "text-gray-600";
                let overlay = a.bildUrl ? `<div class="absolute inset-0 ${a.textFarbe === 'white' ? 'bg-black/40 group-hover:bg-black/50' : 'bg-white/60 group-hover:bg-white/70'} transition z-0"></div>` : "";
                return `
                <div class="${a.bildUrl ? 'border-transparent relative overflow-hidden group' : 'bg-orange-50 border-orange-100'} rounded-2xl p-6 border hover:shadow-lg transition h-full flex flex-col relative z-10" style="${style}">
                    ${overlay}
                    <div class="relative z-10 flex flex-col h-full">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-3 bg-white rounded-full text-brand shadow-sm shrink-0">
                                <i data-lucide="${a.icon}" class="w-6 h-6"></i>
                            </div>
                            <span class="text-xs font-bold uppercase tracking-wider text-brand-dark bg-white/90 backdrop-blur-sm px-2 py-1 rounded shadow-sm">${a.zeitraum}</span>
                        </div>
                        <h3 class="text-lg font-bold ${textColor} mb-2 font-display">${a.titel}</h3>
                        <p class="${descColor} text-sm flex-grow">${a.text}</p>
                    </div>
                </div>`;
            }).join('');
            if (actions.length > ITEMS_PER_PAGE && !showAll) moreContainer.classList.remove('hidden');
            else moreContainer.classList.add('hidden');
            document.getElementById('actions-more-btn').onclick = () => renderActions(actions, true);
            lucide.createIcons();
        }

        function renderTestimonials(testimonials) {
            const container = document.getElementById('testimonials-container');
            container.innerHTML = testimonials.map(t => `
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-green-100/50 flex flex-col transition hover:shadow-md relative z-10">
                    <div class="flex items-center gap-4 mb-6">
                        <img src="${t.avatar}" alt="${t.name}" class="w-14 h-14 rounded-full border-2 border-brand-green/20">
                        <div>
                            <h4 class="font-bold text-gray-900">${t.name}</h4>
                            <p class="text-xs text-brand-green font-semibold uppercase tracking-wider">${t.rolle}</p>
                        </div>
                    </div>
                    <p class="text-gray-600 italic leading-relaxed flex-grow">"${t.text}"</p>
                    <div class="mt-4 text-brand-light">
                        <i data-lucide="quote" class="w-8 h-8 opacity-20"></i>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        function copyToClipboard() {
            const iban = webseitenInhalt.bank.iban.replace(/\s/g, '');
            navigator.clipboard.writeText(iban).then(() => {
                const fb = document.getElementById('copy-feedback');
                fb.classList.remove('opacity-0', 'translate-y-2');
                setTimeout(() => fb.classList.add('opacity-0', 'translate-y-2'), 2500);
            });
        }

        function openModal() {
            const modal = document.getElementById('membership-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.firstElementChild.classList.remove('scale-95', 'opacity-0'), 10);
        }

        function closeModal() {
            document.getElementById('membership-modal').classList.add('hidden');
        }

        document.getElementById('membership-modal').addEventListener('click', (e) => {
            if (e.target.id === 'membership-modal') closeModal();
        });
    </script>
</body>
</html>
